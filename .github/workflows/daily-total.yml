name: Daily hits email

# Two crons + a Central-day gate so the email goes out once per Central calendar
# day even though Actions' scheduled runs are often delayed. Stats come from the
# GoatCounter API (bots filtered, unique visitors detected server-side), so there
# is no running-total file to maintain anymore.
on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

# Shared push lock with the hourly recent-commits workflow so the two never push
# to main at the same time. cancel-in-progress is false so a newer run never
# cancels this email job mid-flight.
concurrency:
  group: main-push
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GC_CODE: rwdenmark            # GoatCounter site code -> https://rwdenmark.goatcounter.com

jobs:
  email-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already emailed today (Central)
        id: gate
        run: |
          today=$(TZ='America/Chicago' date +%Y-%m-%d)
          if [ -f .github/last-run-date.txt ]; then last=$(cat .github/last-run-date.txt); else last=""; fi
          echo "today=$today" >> $GITHUB_OUTPUT
          if [ "$today" = "$last" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Already emailed for $today, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
          else
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch GoatCounter stats for yesterday (Central)
        if: steps.gate.outputs.proceed == 'true'
        id: stats
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: |
          set -euo pipefail
          api="https://${GC_CODE}.goatcounter.com/api/v0"
          # Exact Central-time day boundaries (DST-aware), rounded to the hour as the
          # API expects. Passing the offset explicitly makes the window correct no
          # matter which timezone is configured in GoatCounter.
          day=$(TZ='America/Chicago' date -d 'yesterday' +%Y-%m-%d)
          start=$(TZ='America/Chicago' date -d 'yesterday 00:00' '+%Y-%m-%dT%H:%M:%S%:z')
          end=$(TZ='America/Chicago' date -d 'yesterday 23:00' '+%Y-%m-%dT%H:%M:%S%:z')
          echo "day=$day" >> $GITHUB_OUTPUT

          gc() {
            curl -sS --fail --retry 4 --retry-delay 3 --retry-all-errors --max-time 25 \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${GC_TOKEN}" -G \
              --data-urlencode "start=$start" --data-urlencode "end=$end" "$@"
          }

          # Total pageviews for the day. Abort on failure rather than emailing a bogus 0.
          total_json=$(gc "$api/stats/total") || { echo "::error::GoatCounter total fetch failed"; exit 1; }
          echo "$total_json" | jq -e . >/dev/null 2>&1 || { echo "::error::non-JSON from GoatCounter: $total_json"; exit 1; }
          views=$(echo "$total_json" | jq -r '.total // 0')
          echo "views=$views" >> $GITHUB_OUTPUT

          # Top countries (best-effort; don't fail the email if this call hiccups).
          loc_json=$(gc "$api/stats/locations") || loc_json='{"stats":[]}'
          countries=$(echo "$loc_json" | jq -r '.stats[]? | "  \(.name): \(.count)"' | head -5)
          [ -z "$countries" ] && countries="  (none)"
          {
            echo 'countries<<COUNTRIES_EOF'
            echo "$countries"
            echo 'COUNTRIES_EOF'
          } >> $GITHUB_OUTPUT

      - name: Send email
        if: steps.gate.outputs.proceed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Daily statistics for your developer website"
          to: ryanwdenmark@gmail.com
          from: Portfolio Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Daily statistics for rwdenmark.github.io (via GoatCounter, bots filtered).

            Date: ${{ steps.stats.outputs.day }}
            Homepage views: ${{ steps.stats.outputs.views }}

            Top countries:
            ${{ steps.stats.outputs.countries }}

      - name: Record that we emailed today
        if: steps.gate.outputs.proceed == 'true'
        run: |
          echo "${{ steps.gate.outputs.today }}" > .github/last-run-date.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-run-date.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: record daily stats email sent [skip ci]"
          # recent-commits also pushes to main, so a bare push may be rejected as
          # non-fast-forward; rebase onto latest main and retry up to 5x.
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then
              echo "::error::Failed to push after $n attempts."
              exit 1
            fi
            echo "Push rejected (attempt $n); rebasing onto latest main..."
            git pull --rebase origin main
          done
