name: Recent commits cache

# Generates commits.json once an hour so the home page reads a static file
# instead of calling the GitHub API from each visitor's browser (which hit the
# unauthenticated 60/hour-per-IP limit and silently blanked the feed).
#
# GitHub Actions cron is best-effort and often delayed by tens of minutes, so
# this runs "roughly hourly," which is plenty for a recent-activity widget.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Shared push lock with the daily-hits workflow: both push to main and can fire on
# the same top-of-hour minute (05:00 / 06:00 UTC). A single shared group serializes
# them so they never push at once. cancel-in-progress is false so neither job ever
# cancels the other mid-run — a queued run waits and then runs. This also keeps a
# delayed copy of THIS hourly job from overlapping the next one (it queues instead).
# The rebase-retry on the push step remains the correctness backstop.
concurrency:
  group: main-push
  cancel-in-progress: false

# Force JS-based actions onto Node 24 to match the runner default from 2026-06-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: rwdenmark
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commits.json
        run: |
          set -euo pipefail

          # Five most-recently-pushed repos, excluding forks, archived, and the
          # portfolio repo itself so the feed surfaces engineering work, not site tweaks.
          repos=$(gh api "users/$OWNER/repos?sort=pushed&per_page=30" \
            | jq -r '[.[] | select(.fork==false and .archived==false and .name!="rwdenmark.github.io")][0:5] | .[].name')

          : > all.ndjson
          for repo in $repos; do
            gh api "repos/$OWNER/$repo/commits?per_page=3" \
              | jq --arg repo "$repo" -c '.[] | {
                  repo: $repo,
                  message: (.commit.message | split("\n")[0]),
                  date: (.commit.author.date // .commit.committer.date),
                  url: .html_url
                }' >> all.ndjson || true
          done

          # Merge, sort newest-first, keep the 5 most recent across all repos.
          jq -s 'sort_by(.date) | reverse | .[0:5]' all.ndjson > commits.json
          rm -f all.ndjson
          echo "Wrote commits.json:"
          cat commits.json

      - name: Compute last content-update date
        run: |
          # Date of the most recent commit that changed real content — anything except
          # the bot-maintained housekeeping files (.github/*, commits.json) and this file
          # itself. So the footer reflects content edits (any page, the resume PDF, new
          # About photos), not the hourly cache pushes or the daily counter commits.
          d=$(git log -1 --no-merges --format=%cs -- . ':(exclude).github' ':(exclude)commits.json' ':(exclude)last-updated.txt')
          echo "Last content update: $d"
          echo "$d" > last-updated.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commits.json last-updated.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update recent commits cache [skip ci]"
          # The daily-hits workflow also pushes to main and can fire on the same
          # top-of-hour minute (05:00 / 06:00 UTC), so a bare push may be rejected
          # as non-fast-forward. Rebase onto the latest main and retry up to 5x.
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then
              echo "::error::Failed to push after $n attempts."
              exit 1
            fi
            echo "Push rejected (attempt $n); rebasing onto latest main..."
            git pull --rebase origin main
          done
