name: Recent commits cache

# Generates commits.json hourly so the projects page reads a static file instead of
# calling the GitHub API per visitor (the unauthenticated 60/hour/IP limit blanked the feed).
# Actions cron is best-effort and often delayed, which is fine for a recent-activity widget.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Shared push lock with the other main-pushing workflows so two jobs never push at once.
# cancel-in-progress false means a queued run waits rather than cancelling. The rebase-retry
# on the push step is the correctness backstop.
concurrency:
  group: main-push
  cancel-in-progress: false

# Force JS-based actions onto Node 24 to match the runner default from 2026-06-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: rwdenmark
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commits.json
        run: |
          set -euo pipefail

          # Five most-recently-pushed repos, excluding forks, archived, and the
          # portfolio repo itself so the feed surfaces engineering work, not site tweaks.
          repos=$(gh api "users/$OWNER/repos?sort=pushed&per_page=30" \
            | jq -r '[.[] | select(.fork==false and .archived==false and .name!="rwdenmark.github.io")][0:5] | .[].name')

          : > all.ndjson
          for repo in $repos; do
            # One bad repo must not kill the feed, but it should not vanish silently either.
            gh api "repos/$OWNER/$repo/commits?per_page=3" \
              | jq --arg repo "$repo" -c '.[] | {
                  repo: $repo,
                  message: (.commit.message | split("\n")[0]),
                  date: (.commit.author.date // .commit.committer.date),
                  url: .html_url
                }' >> all.ndjson \
              || echo "::warning::Failed to fetch commits for $repo, feed will omit it this run."
          done

          # Merge, sort newest-first, keep the 5 most recent across all repos.
          jq -s 'sort_by(.date) | reverse | .[0:5]' all.ndjson > commits.json
          rm -f all.ndjson
          echo "Wrote commits.json:"
          cat commits.json

      - name: Compute last content-update date
        run: |
          # Date of the most recent commit that changed real content, anything except
          # the bot-maintained housekeeping files (.github/*, commits.json,
          # last-updated.txt). So the footer reflects content edits (any page, the resume
          # PDF, new About photos), not the hourly cache pushes or the daily email-gate commits.
          d=$(git log -1 --no-merges --format=%cs -- . ':(exclude).github' ':(exclude)commits.json' ':(exclude)last-updated.txt')
          echo "Last content update: $d"
          echo "$d" > last-updated.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commits.json last-updated.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update recent commits cache [skip ci]"
          # The daily-hits workflow also pushes to main and can fire on the same
          # top-of-hour minute (05:00 / 06:00 UTC), so a bare push may be rejected
          # as non-fast-forward. Rebase onto the latest main and retry up to 5x.
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then
              echo "::error::Failed to push after $n attempts."
              exit 1
            fi
            echo "Push rejected (attempt $n), rebasing onto latest main..."
            git pull --rebase origin main
          done
