name: Recent commits cache

# Generates _data/commits.json hourly. Jekyll renders the feed into the projects page
# at build (the commit here triggers the rebuild), so visitors fetch nothing and the
# GitHub API is never called per visitor (the unauthenticated 60/hour/IP limit blanked
# the old client-side feed). Actions cron is best-effort and often delayed, which is
# fine for a recent-activity widget.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Shared push lock with the other main-pushing workflows so two jobs never push at once.
# cancel-in-progress false means a queued run waits rather than cancelling. The rebase-retry
# on the push step is the correctness backstop.
concurrency:
  group: main-push
  cancel-in-progress: false

# Force JS-based actions onto Node 24 to match the runner default from 2026-06-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: rwdenmark
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate _data/commits.json
        run: |
          set -euo pipefail

          # Five most-recently-pushed repos, excluding forks, archived, and the
          # portfolio repo itself so the feed surfaces engineering work, not site tweaks.
          repos=$(gh api "users/$OWNER/repos?sort=pushed&per_page=30" \
            | jq -r '[.[] | select(.fork==false and .archived==false and .name!="rwdenmark.github.io")][0:5] | .[].name')

          : > all.ndjson
          for repo in $repos; do
            # One bad repo must not kill the feed, but it should not vanish silently either.
            gh api "repos/$OWNER/$repo/commits?per_page=3" \
              | jq --arg repo "$repo" -c '.[] | {
                  repo: $repo,
                  message: (.commit.message | split("\n")[0]),
                  date: (.commit.author.date // .commit.committer.date),
                  url: .html_url
                }' >> all.ndjson \
              || echo "::warning::Failed to fetch commits for $repo, feed will omit it this run."
          done

          # Merge, sort newest-first, keep the 5 most recent across all repos.
          jq -s 'sort_by(.date) | reverse | .[0:5]' all.ndjson > _data/commits.json
          rm -f all.ndjson
          echo "Wrote _data/commits.json:"
          cat _data/commits.json

      - name: Compute last content-update date
        run: |
          # Date of the most recent commit that changed real content, anything except
          # the bot-maintained housekeeping files (.github/*, _data/commits.json,
          # _data/last_updated.yml). So the footer reflects content edits (any page, the
          # resume PDF, new About photos), not the hourly cache pushes or the email-gate
          # commits. Jekyll renders the date into the footer at build.
          d=$(git log -1 --no-merges --format=%cs -- . ':(exclude).github' ':(exclude)_data/commits.json' ':(exclude)_data/last_updated.yml')
          echo "Last content update: $d"
          printf 'date: "%s"\n' "$d" > _data/last_updated.yml

      - name: Commit if changed
        uses: ./.github/actions/commit-push
        with:
          paths: _data/commits.json _data/last_updated.yml
          message: "chore: update recent commits cache [skip ci]"
