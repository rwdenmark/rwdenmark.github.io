title: Ryan Denmark
url: https://rwdenmark.github.io
author: Ryan Denmark

# Render build-time dates (footer fallback) in Central, not UTC
timezone: America/Chicago

# Don't process these files/folders into the built site
exclude:
  - README.md
  - .gitignore
  - .github
  - LICENSE
  - .gitattributes

# GitHub Pages allows these plugins out of the box
plugins:
  - jekyll-sitemap

