title: Ryan Denmark
url: https://rwdenmark.github.io
author: Ryan Denmark

# Render build-time dates (footer fallback) in Central, not UTC
timezone: America/Chicago

# Don't process these files/folders into the built site
exclude:
  - README.md
  - .gitignore
  - .github
  - LICENSE
  - .gitattributes

# GitHub Pages allows these plugins out of the box
plugins:
  - jekyll-sitemap

# Keep the Search Console verification file published but out of the sitemap
defaults:
  - scope:
      path: "googlec0603268e666aeeb.html"
    values:
      sitemap: false

