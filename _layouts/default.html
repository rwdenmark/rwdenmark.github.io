<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description }}" />
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}" />
  <link rel="alternate icon" href="{{ '/favicon.ico' | relative_url }}" />
  <link rel="preconnect" href="https://api.counterapi.dev" crossorigin />
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  <script src="{{ '/assets/script.js' | relative_url }}" defer></script>
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{{ page.og_title | default: page.title }}" />
  <meta property="og:description" content="{{ page.og_description | default: page.description }}" />
  <meta property="og:image" content="{{ '/og-image.png' | absolute_url }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.og_title | default: page.title }}" />
  <meta name="twitter:description" content="{{ page.og_description | default: page.description }}" />
  <meta name="twitter:image" content="{{ '/og-image.png' | absolute_url }}" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Ryan Denmark",
    "givenName": "Ryan",
    "familyName": "Denmark",
    "jobTitle": "Backend Software Engineer",
    "url": "{{ site.url }}/",
    "email": "ryanwdenmark@gmail.com",
    "sameAs": [
      "https://github.com/rwdenmark",
      "https://www.linkedin.com/in/rwdenmark"
    ],
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Eagan",
      "addressRegion": "MN",
      "addressCountry": "US"
    }
  }
  </script>
</head>
<body>
  <div class="rail-bg" aria-hidden="true"></div>
  <svg class="bg-circuit" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
      <pattern id="circuit-pattern" x="0" y="0" width="280" height="280" patternUnits="userSpaceOnUse">
        <g stroke="#1f6feb" stroke-width="1" fill="none" opacity="0.35">
          <path d="M 0,40 L 70,40 L 70,90 L 150,90"/>
          <path d="M 210,0 L 210,50 L 260,50 L 260,130"/>
          <path d="M 0,170 L 50,170 L 50,220 L 130,220 L 130,280"/>
          <path d="M 180,150 L 220,150 L 220,200 L 280,200"/>
          <path d="M 100,150 L 100,180"/>
          <rect x="100" y="100" width="60" height="40" rx="2"/>
          <g stroke-width="1">
            <line x1="108" y1="100" x2="108" y2="95"/>
            <line x1="120" y1="100" x2="120" y2="95"/>
            <line x1="132" y1="100" x2="132" y2="95"/>
            <line x1="144" y1="100" x2="144" y2="95"/>
            <line x1="156" y1="100" x2="156" y2="95"/>
            <line x1="108" y1="140" x2="108" y2="145"/>
            <line x1="120" y1="140" x2="120" y2="145"/>
            <line x1="132" y1="140" x2="132" y2="145"/>
            <line x1="144" y1="140" x2="144" y2="145"/>
            <line x1="156" y1="140" x2="156" y2="145"/>
          </g>
          <rect x="200" y="70" width="22" height="10" rx="1"/>
          <rect x="20" y="220" width="10" height="22" rx="1"/>
          <rect x="160" y="190" width="40" height="6" rx="1"/>
        </g>
        <g fill="#1f6feb" opacity="0.55">
          <circle cx="70" cy="40" r="2"/>
          <circle cx="70" cy="90" r="2"/>
          <circle cx="210" cy="50" r="2"/>
          <circle cx="260" cy="50" r="2"/>
          <circle cx="50" cy="170" r="2"/>
          <circle cx="130" cy="220" r="2"/>
          <circle cx="220" cy="150" r="2"/>
          <circle cx="220" cy="200" r="2"/>
          <circle cx="100" cy="150" r="2"/>
          <circle cx="100" cy="100" r="2"/>
        </g>
        <path d="M 0,40 L 70,40 L 70,90 L 150,90" stroke="#79c0ff" stroke-width="1.5" fill="none" stroke-dasharray="16 600" stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="4s" repeatCount="indefinite"/>
        </path>
        <path d="M 210,0 L 210,50 L 260,50 L 260,130" stroke="#79c0ff" stroke-width="1.5" fill="none" stroke-dasharray="14 600" stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="5.5s" repeatCount="indefinite"/>
        </path>
        <path d="M 0,170 L 50,170 L 50,220 L 130,220 L 130,280" stroke="#79c0ff" stroke-width="1.5" fill="none" stroke-dasharray="18 600" stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="-300" dur="7s" repeatCount="indefinite"/>
        </path>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#circuit-pattern)"/>
  </svg>
  <header>
    <div class="container">
      <div class="name-row">
        <h1>Ryan Denmark</h1>
        <span class="location">Eagan, MN</span>
      </div>
      <p class="tagline">Backend software engineer. End-to-end client implementations in Java and SQL. Multi-stage pipelines, REST APIs, partner integration, regulated data.</p>
      <nav class="links" aria-label="Main navigation">
        <div class="links-group">
          <a href="{{ '/index.html' | relative_url }}"{% if page.page_id == 'home' %} class="active" aria-current="page"{% endif %}>Home</a>
          <a href="{{ '/resume.html' | relative_url }}"{% if page.page_id == 'resume' %} class="active" aria-current="page"{% endif %}>Resume</a>
          <a href="{{ '/jax.html' | relative_url }}"{% if page.page_id == 'jax' %} class="active" aria-current="page"{% endif %}>Jax</a>
        </div>
        <div class="links-group">
          <a href="https://github.com/rwdenmark" rel="noopener noreferrer" target="_blank">GitHub</a>
          <a href="https://www.linkedin.com/in/rwdenmark" rel="noopener noreferrer" target="_blank">LinkedIn</a>
          <a href="mailto:ryanwdenmark@gmail.com" id="email-link" data-email="ryanwdenmark@gmail.com" aria-label="Copy email address">Email</a>
        </div>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>
  <footer>
    <div class="container">
      <a href="https://github.com/rwdenmark/rwdenmark.github.io" rel="noopener noreferrer" target="_blank">View source on GitHub</a>
      <span>Last updated <span class="last-updated">recently</span></span>
    </div>
  </footer>
  <div id="copy-toast" class="copy-toast" role="status" aria-live="polite"></div>
</body>
</html>
