<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jax — Ryan Denmark</title>
  <meta name="description" content="Jax, our golden retriever." />
  <style>
    :root {
      /* GitHub dark palette */
      --canvas: #0d1117;
      --header-bg: #010409;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #2f81f7;
      --accent-hover: #58a6ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--canvas);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .bg-circuit {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, 0.15);
      pointer-events: none;
      z-index: 2;
    }
    body::before { left: calc(50% - 490px); }
    body::after  { right: calc(50% - 490px); }
    @media (max-width: 1044px) {
      body::before, body::after { display: none; }
      .bg-circuit { display: none; }
    }
    header, main, footer {
      position: relative;
      z-index: 3;
    }
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 32px;
    }
    main .container,
    footer .container {
      background: var(--canvas);
    }
    .name-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.015em;
      color: var(--text);
    }
    .location {
      font-size: 1rem;
      color: var(--muted);
    }
    .tagline {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0;
    }
    main {
      flex: 1;
      padding: 24px 0 48px;
    }
    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .page-subtitle {
      color: var(--muted);
      margin: 0 0 32px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .card:hover img {
      transform: scale(1.03);
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 0;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
    }
    .links a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .links a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    @media (max-width: 520px) {
      header { padding: 20px 0; }
      main { padding: 20px 0 32px; }
      footer { padding: 16px 0; }
      .container { padding: 0 20px; }
      h1 { font-size: 1.875rem; }
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <svg class="bg-circuit" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
      <pattern id="circuit-pattern" x="0" y="0" width="280" height="280" patternUnits="userSpaceOnUse">
        <g stroke="#1f6feb" stroke-width="1" fill="none" opacity="0.35">
          <path d="M 0,40 L 70,40 L 70,90 L 150,90"/>
          <path d="M 210,0 L 210,50 L 260,50 L 260,130"/>
          <path d="M 0,170 L 50,170 L 50,220 L 130,220 L 130,280"/>
          <path d="M 180,150 L 220,150 L 220,200 L 280,200"/>
          <path d="M 100,150 L 100,180"/>
          <rect x="100" y="100" width="60" height="40" rx="2"/>
          <g stroke-width="1">
            <line x1="108" y1="100" x2="108" y2="95"/>
            <line x1="120" y1="100" x2="120" y2="95"/>
            <line x1="132" y1="100" x2="132" y2="95"/>
            <line x1="144" y1="100" x2="144" y2="95"/>
            <line x1="156" y1="100" x2="156" y2="95"/>
            <line x1="108" y1="140" x2="108" y2="145"/>
            <line x1="120" y1="140" x2="120" y2="145"/>
            <line x1="132" y1="140" x2="132" y2="145"/>
            <line x1="144" y1="140" x2="144" y2="145"/>
            <line x1="156" y1="140" x2="156" y2="145"/>
          </g>
          <rect x="200" y="70" width="22" height="10" rx="1"/>
          <rect x="20" y="220" width="10" height="22" rx="1"/>
          <rect x="160" y="190" width="40" height="6" rx="1"/>
        </g>
        <g fill="#1f6feb" opacity="0.55">
          <circle cx="70" cy="40" r="2"/>
          <circle cx="70" cy="90" r="2"/>
          <circle cx="210" cy="50" r="2"/>
          <circle cx="260" cy="50" r="2"/>
          <circle cx="50" cy="170" r="2"/>
          <circle cx="130" cy="220" r="2"/>
          <circle cx="220" cy="150" r="2"/>
          <circle cx="220" cy="200" r="2"/>
          <circle cx="100" cy="150" r="2"/>
          <circle cx="100" cy="100" r="2"/>
        </g>
        <path d="M 0,40 L 70,40 L 70,90 L 150,90"
              stroke="#79c0ff" stroke-width="1.5" fill="none"
              stroke-dasharray="16 600"
              stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="4s" repeatCount="indefinite"/>
        </path>
        <path d="M 210,0 L 210,50 L 260,50 L 260,130"
              stroke="#79c0ff" stroke-width="1.5" fill="none"
              stroke-dasharray="14 600"
              stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="5.5s" repeatCount="indefinite"/>
        </path>
        <path d="M 0,170 L 50,170 L 50,220 L 130,220 L 130,280"
              stroke="#79c0ff" stroke-width="1.5" fill="none"
              stroke-dasharray="18 600"
              stroke-linecap="round">
          <animate attributeName="stroke-dashoffset" from="0" to="-300" dur="7s" repeatCount="indefinite"/>
        </path>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#circuit-pattern)"/>
  </svg>
  <header>
    <div class="container">
      <div class="name-row">
        <h1>Ryan Denmark</h1>
        <span class="location">Eagan, MN</span>
      </div>
      <p class="tagline">Backend software engineer. End-to-end client implementations in Java and SQL. Multi-stage pipelines, REST APIs, partner integration, regulated data.</p>
    </div>
  </header>
  <main>
    <div class="container">
      <h2 class="page-title">Jax</h2>
      <p class="page-subtitle">Our golden retriever.</p>
      <div class="gallery">
        <div class="card"><img src="jax/jax-01.jpg" alt="Jax with Ryan in the yard" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-02.jpg" alt="Jax as a puppy on his back" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-03.jpg" alt="Jax sitting on a blanket" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-04.jpg" alt="Jax sniffing behind furniture" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-05.jpg" alt="Jax with toys" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-06.jpg" alt="Jax sitting with leash on" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-07.jpg" alt="Jax with a frisbee on his face outside" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-08.jpg" alt="Jax and the cat on a dog bed" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-09.jpg" alt="Jax upside down" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-10.jpg" alt="Jax smiling indoors" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-11.jpg" alt="Jax with Ryan in the car" loading="lazy" /></div>
        <div class="card"><img src="jax/jax-12.jpg" alt="Jax in a birthday bandana" loading="lazy" /></div>
      </div>
    </div>
  </main>
  <footer>
    <div class="container">
      <nav class="links" aria-label="Contact and profiles">
        <a href="index.html">Home</a>
        <a href="https://github.com/rwdenmark" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/rwdenmark" rel="noopener">LinkedIn</a>
        <a href="mailto:ryanwdenmark@gmail.com">Email</a>
      </nav>
    </div>
  </footer>
</body>
</html>
