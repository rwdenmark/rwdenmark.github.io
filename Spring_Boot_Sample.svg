  <g font-family="Consolas, 'Courier New', monospace" font-size="12">
    <text x="48" y="50" fill="#BBB529">@RestController</text>
    <text x="48" y="68"><tspan fill="#BBB529">@RequestMapping(</tspan><tspan fill="#6A8759">"/api/users"</tspan><tspan fill="#BBB529">)</tspan></text>
    <text x="48" y="86"><tspan fill="#CC7832">public class</tspan> <tspan fill="#A9B7C6">UserController {</tspan></text>
    <text x="48" y="122" fill="#808080" font-style="italic">    // GET /api/users/{id}</text>
    <text x="48" y="140"><tspan fill="#A9B7C6">    </tspan><tspan fill="#CC7832">private final</tspan> <tspan fill="#A9B7C6">UserService users;</tspan></text>
    <text x="48" y="176"><tspan fill="#A9B7C6">    </tspan><tspan fill="#BBB529">@GetMapping(</tspan><tspan fill="#6A8759">"/{id}"</tspan><tspan fill="#BBB529">)</tspan></text>
    <text x="48" y="194"><tspan fill="#A9B7C6">    </tspan><tspan fill="#CC7832">public</tspan> <tspan fill="#A9B7C6">ResponseEntity&lt;User&gt; </tspan><tspan fill="#FFC66D">getUser</tspan><tspan fill="#A9B7C6">(</tspan></text>
    <text x="48" y="212"><tspan fill="#A9B7C6">            </tspan><tspan fill="#BBB529">@PathVariable</tspan> <tspan fill="#CC7832">Long</tspan> <tspan fill="#A9B7C6">id) {</tspan></text>
    <text x="48" y="230"><tspan fill="#A9B7C6">        </tspan><tspan fill="#CC7832">return</tspan> <tspan fill="#A9B7C6">users.</tspan><tspan fill="#FFC66D">findById</tspan><tspan fill="#A9B7C6">(id)</tspan></text>
    <text x="48" y="248"><tspan fill="#A9B7C6">            .</tspan><tspan fill="#FFC66D">map</tspan><tspan fill="#A9B7C6">(ResponseEntity::</tspan><tspan fill="#FFC66D">ok</tspan><tspan fill="#A9B7C6">)</tspan></text>
    <text x="48" y="266"><tspan fill="#A9B7C6">            .</tspan><tspan fill="#FFC66D">orElse</tspan><tspan fill="#A9B7C6">(ResponseEntity.</tspan><tspan fill="#FFC66D">notFound</tspan><tspan fill="#A9B7C6">().</tspan><tspan fill="#FFC66D">build</tspan><tspan fill="#A9B7C6">());</tspan></text>
    <text x="48" y="284" fill="#A9B7C6">    }</text>
    <text x="48" y="302" fill="#A9B7C6">}</text>
